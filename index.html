<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Météo Beaune</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border-radius: 2.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 320px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }
        .city-name {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .city-name i { width: 16px; height: 16px; color: #60a5fa; }
        .weather-desc {
            font-size: 0.7rem;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 4px;
        }
        .weather-icon i { width: 40px; height: 40px; }
        .temperature {
            margin-bottom: 2rem;
        }
        .temp-row {
            display: flex;
            align-items: flex-start;
        }
        .temp-value {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 1;
        }
        .temp-unit {
            font-size: 2rem;
            font-weight: 300;
            margin-top: 0.5rem;
        }
        .clock-section { }
        .clock-row {
            display: flex;
            align-items: baseline;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
        }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }
        .date-str {
            font-size: 0.65rem;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 4px;
        }
        .extra-info {
            display: flex;
            gap: 1rem;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .extra-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .extra-label {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .extra-value {
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="header">
            <div>
                <div class="city-name">
                    <i data-lucide="map-pin"></i>
                    Beaune
                </div>
                <div class="weather-desc" id="weather-desc">Chargement...</div>
            </div>
            <div class="weather-icon" id="weather-icon">
                <i data-lucide="cloud-sun"></i>
            </div>
        </div>

        <div class="temperature">
            <div class="temp-row">
                <span class="temp-value" id="temperature">--</span>
                <span class="temp-unit">°C</span>
            </div>
        </div>

        <div class="clock-section">
            <div class="clock-row">
                <span id="hours">--</span>
                <span class="blink" style="margin: 0 2px;">:</span>
                <span id="minutes">--</span>
            </div>
            <div class="date-str" id="date">-- -- ----</div>
        </div>

        <div class="extra-info">
            <div class="extra-item">
                <span class="extra-label">Humidité</span>
                <span class="extra-value" id="humidity">--%</span>
            </div>
            <div class="extra-item">
                <span class="extra-label">Vent</span>
                <span class="extra-value" id="wind">-- km/h</span>
            </div>
            <div class="extra-item">
                <span class="extra-label">Ressenti</span>
                <span class="extra-value" id="feels">--°</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function updateClock() {
            const now = new Date();
            document.getElementById('hours').textContent = String(now.getHours()).padStart(2,'0');
            document.getElementById('minutes').textContent = String(now.getMinutes()).padStart(2,'0');
            const opts = { weekday:'long', day:'numeric', month:'short' };
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', opts);
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchWeather() {
            try {
                const url = 'https://api.open-meteo.com/v1/forecast?latitude=47.0260&longitude=4.8400&current=temperature_2m,weather_code,is_day,relative_humidity_2m,wind_speed_10m,apparent_temperature&timezone=Europe%2FParis';
                const res = await fetch(url);
                const data = await res.json();
                const c = data.current;

                document.getElementById('temperature').textContent = Math.round(c.temperature_2m);
                document.getElementById('humidity').textContent = c.relative_humidity_2m + '%';
                document.getElementById('wind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
                document.getElementById('feels').textContent = Math.round(c.apparent_temperature) + '°';

                const codes = {
                    0: ["Ciel clair", "sun"],
                    1: ["Peu nuageux", "cloud-sun"],
                    2: ["Nuageux", "cloud"],
                    3: ["Couvert", "cloud"],
                    45: ["Brouillard", "cloud-fog"],
                    48: ["Brouillard", "cloud-fog"],
                    51: ["Bruine légère", "cloud-drizzle"],
                    61: ["Pluie légère", "cloud-drizzle"],
                    63: ["Pluie", "cloud-rain"],
                    65: ["Pluie forte", "cloud-rain"],
                    71: ["Neige légère", "cloud-snow"],
                    73: ["Neige", "cloud-snow"],
                    75: ["Neige forte", "cloud-snow"],
                    80: ["Averses", "cloud-rain"],
                    95: ["Orage", "cloud-lightning"]
                };

                const [desc, icon] = codes[c.weather_code] || ["Variable", "cloud"];
                document.getElementById('weather-desc').textContent = desc;
                document.getElementById('weather-icon').innerHTML = `<i data-lucide="${c.is_day ? icon : 'moon'}"></i>`;
                lucide.createIcons();
            } catch(e) {
                document.getElementById('weather-desc').textContent = "Erreur réseau";
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 600000);
    </script>
</body>
</html>
